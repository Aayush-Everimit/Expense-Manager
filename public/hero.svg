<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">

    <!-- Background blob -->
    <defs>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6366F1"/>
            <stop offset="100%" stop-color="#8B5CF6"/>
        </linearGradient>

        <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4F46E5"/>
            <stop offset="100%" stop-color="#A78BFA"/>
        </linearGradient>
    </defs>

    <rect x="0" y="0" width="500" height="500" rx="40" fill="#F8FAFC"/>

    <!-- Bars (growth chart) -->
    <rect x="120" y="300" width="30" height="100" rx="8" fill="url(#barGrad)"/>
    <rect x="170" y="260" width="30" height="140" rx="8" fill="url(#barGrad)"/>
    <rect x="220" y="220" width="30" height="180" rx="8" fill="url(#barGrad)"/>
    <rect x="270" y="180" width="30" height="220" rx="8" fill="url(#barGrad)"/>

    <!-- Upward arrow -->
    <path d="M120 250 L200 200 L260 230 L340 140"
          stroke="#4F46E5" stroke-width="4" fill="none"/>
    <polygon points="340,140 330,155 355,150" fill="#4F46E5"/>

    <!-- INR Symbol -->
    <text x="250" y="200" text-anchor="middle" font-size="120" font-weight="bold" fill="url(#bgGrad)">
        ₹
    </text>

    <!-- Coins -->
    <circle cx="350" cy="330" r="25" fill="#FBBF24"/>
    <circle cx="350" cy="300" r="25" fill="#F59E0B"/>
    <text x="350" y="310" text-anchor="middle" font-size="18" fill="#fff">₹</text>

</svg>